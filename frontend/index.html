<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI chat
  </title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .chat-container {
      width: 420px;
      height: 600px;
      background-color: #2c2c2c;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .chat-header {
      background-color: #3a3a3a;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: bold;
      color: #ffffff;
      border-bottom: 1px solid #444;
    }

    #chatbox {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #chatbox::-webkit-scrollbar {
      width: 6px;
    }

    #chatbox::-webkit-scrollbar-thumb {
      background-color: #555;
      border-radius: 3px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .user-message {
      background-color: #4f8ef7;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .ai-message {
      background-color: #3a3a3a;
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .chat-input {
      display: flex;
      padding: 12px;
      background-color: #3a3a3a;
      border-top: 1px solid #444;
      gap: 8px;
    }

    #userInput {
      flex: 1;
      padding: 10px 14px;
      border-radius: 24px;
      border: none;
      background-color: #2c2c2c;
      color: #ffffff;
      font-size: 14px;
      outline: none;
    }

    #userInput::placeholder {
      color: #888;
    }

    button {
      padding: 10px 18px;
      background-color: #4f8ef7;
      color: white;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    button:hover {
      background-color: #3a7de0;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">🤖 AI chat</div>
    <div id="chatbox"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const chatbox = document.getElementById('chatbox');
      const message = input.value;

      if (!message) return;

      chatbox.innerHTML += `<div class="message user-message">${message}</div>`;
      input.value = '';
      chatbox.scrollTop = chatbox.scrollHeight;

      try {
        const response = await fetch('http://localhost:3000/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: message })
        });

        const data = await response.json();
        if (!response.ok) {
          chatbox.innerHTML += `<div class="message ai-message">Error: ${data.error || 'No response from server'}</div>`;
          chatbox.scrollTop = chatbox.scrollHeight;
          return;
        }

        chatbox.innerHTML += `<div class="message ai-message">${data.reply}</div>`;
        chatbox.scrollTop = chatbox.scrollHeight;
      } catch (error) {
        chatbox.innerHTML += `<div class="message ai-message">Error sending message.</div>`;
        chatbox.scrollTop = chatbox.scrollHeight;
        console.error(error);
      }
    }

    document.getElementById('userInput').addEventListener('keydown', function(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    });
  </script>
</body>
</html>
